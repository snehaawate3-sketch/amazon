<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Login</title>
  <link rel="stylesheet" href="p1.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <main class="container">
    <h1>Login Type</h1>
    <div class="field">
      <button id="userLogin" class="primary">Login as User</button>
    </div>
    <div class="field">
      <button id="customerLogin" class="primary">Login as Customer</button>
    </div>
    <div class="output">Choose a role to continue.</div>
  </main>
  <script>
    const userLogin = document.getElementById('userLogin');
    const customerLogin = document.getElementById('customerLogin');

    userLogin.addEventListener('click', () => {
      window.location.href = 'login-user.html';
    });

    customerLogin.addEventListener('click', () => {
      window.location.href = 'login-customer.html';
    });
  </script>
</body>
</html>
