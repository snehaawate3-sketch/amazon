<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="p1.css" />
</head>
<body>
  <main class="container">
    <h1>Quick Age Calculator</h1>

    <div class="field">
      <label for="heightInput">Height (cm)</label>
      <input id="heightInput" type="number" min="0" placeholder="e.g. 165" />
      <button id="heightBtn">Set Height</button>
    </div>

    <div class="field">
      <label for="weightInput">Weight (kg)</label>
      <input id="weightInput" type="number" min="0" placeholder="e.g. 60" />
      <button id="weightBtn">Set Weight</button>
    </div>

    <div class="field">
      <button id="ageBtn" class="primary">Show Age</button>
    </div>

    <div id="output" class="output">Age will appear here</div>
    <p class="hint">Use the buttons to record height and weight, then click Show Age.</p>
  </main>
  <script src="p1.js"></script>
</body>
</html>
